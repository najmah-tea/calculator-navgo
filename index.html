<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator GO - NAV GO LNGSHOT</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-konsol: #0f1c3f;      /* Biru Navy Tua dari Logo NAV GO */
            --panel-white: #ffffff;     /* Putih Bersih */
            --accent-cyan: #00d2ff;     /* Biru Muda/Cyan Glow dari Logo */
            --screen-dark: #121824;     /* Warna Layar LCD */
            --text-glow: #00ffff;       /* Font Neon Cyan */
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 1px;
        }

        /* Header Gaya LNGSHOT */
        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .brand-title {
            font-size: 54px;
            color: var(--bg-konsol);
            text-shadow: 3px 3px 0px var(--accent-cyan);
            margin: 0;
            line-height: 1;
        }
        .brand-subtitle {
            background-color: var(--bg-konsol);
            color: #ffffff;
            padding: 3px 12px;
            font-size: 20px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
            border: 2px solid var(--accent-cyan);
        }

        /* Kotak Konsol Utama */
        .konsol-card {
            background: var(--bg-konsol);
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: inset -5px -5px 0px #070d22, inset 5px 5px 0px #1e3575, 0 12px 30px rgba(15, 28, 63, 0.3);
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
            border: 4px solid #070d22;
        }

        /* Panel Putih Bagian Dalam */
        .panel-dalam {
            background: var(--panel-white);
            border: 4px solid #000000;
            border-radius: 12px;
            padding: 16px;
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.05);
        }

        /* Grid Pilihan Mata Uang (Tabs) */
        .tabs-matauang {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 18px;
        }
        .btn-kurs {
            font-family: 'VT323', monospace;
            background: #ffffff;
            border: 3px solid #000000;
            font-size: 20px;
            font-weight: bold;
            padding: 6px 0;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000000;
            transition: all 0.1s ease;
        }
        .btn-kurs.active {
            background: var(--accent-cyan);
            color: #000000;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.2);
            transform: translate(1px, 1px);
        }

        /* Form Input Baris */
        .grup-input {
            margin-bottom: 14px;
        }
        .grup-input label {
            display: block;
            font-size: 19px;
            color: var(--bg-konsol);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .wrapper-input {
            position: relative;
            display: flex;
            align-items: center;
        }
        .wrapper-input input {
            width: 100%;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 6px 40px 6px 12px;
            border: 3px solid #000000;
            background-color: #f7f9fc;
            box-sizing: border-box;
            color: #000000;
        }
        .wrapper-input input:focus {
            outline: none;
            background-color: #ffffff;
            border-color: var(--bg-konsol);
        }
        .simbol-matauang {
            position: absolute;
            right: 12px;
            font-size: 22px;
            color: #555555;
            font-weight: bold;
        }

        /* Layar Rincian Hasil (Cyber Solar Screen) */
        .layar-solar {
            background-color: var(--screen-dark);
            border-radius: 8px;
            padding: 14px;
            margin-top: 18px;
            border: 3px solid #000000;
            color: var(--text-glow);
            box-shadow: inset 0px 4px 8px rgba(0,0,0,0.6);
        }
        .header-solar {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            color: #4f6585;
            border-bottom: 2px dashed #222f47;
            padding-bottom: 4px;
            margin-bottom: 10px;
        }
        .lampu-indikator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-left: 3px;
        }
        .baris-solar {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .baris-solar.totalan {
            font-size: 34px;
            color: #ffffff;
            border-top: 2px solid #222f47;
            padding-top: 6px;
            margin-top: 6px;
            text-shadow: 0 0 4px var(--text-glow);
        }
        #status-api {
            font-size: 14px;
            color: #a0aec0;
            text-align: center;
            margin-top: 5px;
            display: block;
        }

        /* Bagian Bawah Konsol */
        .kontrol-bawah {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 5px;
        }
        .aksen-garis {
            display: flex;
            gap: 8px;
        }
        .garis {
            width: 24px;
            height: 6px;
            background: #070d22;
            transform: skewX(-20deg);
        }
        .btn-clear {
            background: #ffffff;
            border: 3px solid #000000;
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 4px 14px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 0px #000000;
        }
        .btn-clear:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        /* Footer Papan Nama */
        .footer-tag {
            color: var(--bg-konsol);
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="brand-title">NAV GO</div>
        <div class="brand-subtitle">LNGSHOT VERSION</div>
    </div>

    <div class="konsol-card">
        <div class="panel-dalam">
            
            <div class="tabs-matauang">
