<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator GO - NAV GO LNGSHOT</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-konsol: #0f1c3f;      /* Biru Navy Tua dari Logo NAV GO */
            --panel-white: #ffffff;     /* Putih Bersih */
            --accent-cyan: #00d2ff;     /* Biru Muda/Cyan Glow dari Logo */
            --screen-dark: #121824;     /* Warna Layar LCD */
            --text-glow: #00ffff;       /* Font Neon Cyan */
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 1px;
        }

        /* Header Gaya LNGSHOT */
        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .brand-title {
            font-size: 54px;
            color: var(--bg-konsol);
            text-shadow: 3px 3px 0px var(--accent-cyan);
            margin: 0;
            line-height: 1;
        }
        .brand-subtitle {
            background-color: var(--bg-konsol);
            color: #ffffff;
            padding: 3px 12px;
            font-size: 20px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
            border: 2px solid var(--accent-cyan);
        }

        /* Kotak Konsol Utama */
        .konsol-card {
            background: var(--bg-konsol);
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: inset -5px -5px 0px #070d22, inset 5px 5px 0px #1e3575, 0 12px 30px rgba(15, 28, 63, 0.3);
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
            border: 4px solid #070d22;
        }

        /* Panel Putih Bagian Dalam */
        .panel-dalam {
            background: var(--panel-white);
            border: 4px solid #000000;
            border-radius: 12px;
            padding: 16px;
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.05);
        }

        /* Grid Pilihan Mata Uang (Tabs) */
        .tabs-matauang {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 18px;
        }
        .btn-kurs {
            font-family: 'VT323', monospace;
            background: #ffffff;
            border: 3px solid #000000;
            font-size: 20px;
            font-weight: bold;
            padding: 6px 0;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000000;
            transition: all 0.1s ease;
        }
        .btn-kurs.active {
            background: var(--accent-cyan);
            color: #000000;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.2);
            transform: translate(1px, 1px);
        }

        /* Form Input Baris */
        .grup-input {
            margin-bottom: 14px;
        }
        .grup-input label {
            display: block;
            font-size: 19px;
            color: var(--bg-konsol);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .wrapper-input {
            position: relative;
            display: flex;
            align-items: center;
        }
        .wrapper-input input {
            width: 100%;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 6px 40px 6px 12px;
            border: 3px solid #000000;
            background-color: #f7f9fc;
            box-sizing: border-box;
            color: #000000;
        }
        .wrapper-input input:focus {
            outline: none;
            background-color: #ffffff;
            border-color: var(--bg-konsol);
        }
        .simbol-matauang {
            position: absolute;
            right: 12px;
            font-size: 22px;
            color: #555555;
            font-weight: bold;
        }
        .info-format {
            font-size: 14px;
            color: #718096;
            margin-top: 2px;
            display: block;
        }

        /* Layar Rincian Hasil (Cyber Solar Screen) */
        .layar-solar {
            background-color: var(--screen-dark);
            border-radius: 8px;
            padding: 14px;
            margin-top: 18px;
            border: 3px solid #000000;
            color: var(--text-glow);
            box-shadow: inset 0px 4px 8px rgba(0,0,0,0.6);
        }
        .header-solar {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            color: #4f6585;
            border-bottom: 2px dashed #222f47;
            padding-bottom: 4px;
            margin-bottom: 10px;
        }
        .lampu-indikator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-left: 3px;
        }
        .baris-solar {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .baris-solar.totalan {
            font-size: 34px;
            color: #ffffff;
            border-top: 2px solid #222f47;
            padding-top: 6px;
            margin-top: 6px;
            text-shadow: 0 0 4px var(--text-glow);
        }
        #status-api {
            font-size: 14px;
            color: #a0aec0;
            text-align: center;
            margin-top: 5px;
            display: block;
        }

        /* Bagian Bawah Konsol */
        .kontrol-bawah {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 5px;
        }
        .aksen-garis {
            display: flex;
            gap: 8px;
        }
        .garis {
            width: 24px;
            height: 6px;
            background: #070d22;
            transform: skewX(-20deg);
        }
        .btn-clear {
            background: #ffffff;
            border: 3px solid #000000;
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 4px 14px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 0px #000000;
        }
        .btn-clear:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        /* Footer Papan Nama */
        .footer-tag {
            color: var(--bg-konsol);
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="brand-title">NAV GO</div>
        <div class="brand-subtitle">LNGSHOT VERSION</div>
    </div>

    <div class="konsol-card">
        <div class="panel-dalam">
            
            <div class="tabs-matauang">
                <button class="btn-kurs active" id="tab-KRW" onclick="gantiMataUang('KRW')">KRW</button>
                <button class="btn-kurs" id="tab-CNY" onclick="gantiMataUang('CNY')">CNY</button>
                <button class="btn-kurs" id="tab-JPY" onclick="gantiMataUang('JPY')">JPY</button>
                <button class="btn-kurs" id="tab-THB" onclick="gantiMataUang('THB')">THB</button>
            </div>

            <div class="grup-input">
                <label id="label-harga">Item Price (₩)</label>
                <div class="wrapper-input">
                    <input type="number" id="hargaBarang" value="0" step="0.1" oninput="prosesKalkulasi()">
                    <span class="simbol-matauang" id="simbol-harga">₩</span>
                </div>
                <span class="info-format" id="info-format-harga">*Contoh: ketik 0.1 untuk 1,000₩</span>
            </div>

            <div class="grup-input">
                <label>Fee Jasa GO (IDR)</label>
                <div class="wrapper-input">
                    <input type="number" id="feeGo" value="15000" oninput="prosesKalkulasi()">
                    <span class="simbol-matauang">Rp</span>
                </div>
            </div>

            <div class="grup-input">
                <label id="label-domestik">Dom. Shipping (₩)</label>
                <div class="wrapper-input">
                    <input type="number" id="domesticShipping" value="0" step="0.1" oninput="prosesKalkulasi()">
                    <span class="simbol-matauang" id="simbol-domestik">₩</span>
                </div>
                <span class="info-format" id="info-format-domestik">*Contoh: ketik 0.3 untuk 3,000₩</span>
            </div>

            <div class="layar-solar">
                <div class="header-solar">
                    <span>LIVE RATE DATA</span>
                    <div class="lampu-indikator">
                        <span id="indicator-light" style="background:#ffcc00;"></span>
                        <span style="background:#ffffff;"></span>
                    </div>
                </div>
                <div class="baris-solar">
                    <span>CONVERT:</span>
                    <span id="hasilKonversi">0</span>
                </div>
                <div class="baris-solar">
                    <span>GO FEE:</span>
                    <span id="hasilFee">15.000</span>
                </div>
                <div class="baris-solar">
                    <span>DOM SHIP:</span>
                    <span id="hasilDomestic">0</span>
                </div>
                <div class="baris-solar totalan">
                    <span>TOTAL:</span>
                    <span id="hasilTotal">15.000</span>
                </div>
                <span id="status-api">LOADING LIVE RATES...</span>
            </div>

        </div>

        <div class="kontrol-bawah">
            <div class="aksen-garis">
                <div class="garis"></div>
                <div class="garis"></div>
                <div class="garis"></div>
            </div>
            <button class="btn-clear" onclick="resetSistem()">CLEAR</button>
        </div>
    </div>

    <div class="footer-tag">🏡 JAKTIM OPERATIONAL • © 2026</div>

<script>
    // Data cadangan dasar (Backup Shop Rates)
    const datasetKurs = {
        KRW: { rate: 12.8, sym: '₩', apiCode: 'KRW' },
        CNY: { rate: 2640.0, sym: '¥', apiCode: 'CNY' },
        JPY: { rate: 112.0, sym: '¥', apiCode: 'JPY' },
        THB: { rate: 540.0, sym: '฿', apiCode: 'THB' }
    };

    let mataUangAktif = 'KRW';

    // Mengambil data Kurs Asli secara live & otomatis ditambahkan margin toko
    async function fetchLiveRates() {
        try {
            const response = await fetch('https://open.er-api.com/v6/latest/IDR');
            if (!response.ok) throw new Error('Network error');
            
            const data = await response.json();
            const rates = data.rates;

            // Tambahan margin pengaman/poin untuk rate toko kamu (+0.5, +60, +3, +15)
            datasetKurs.KRW.rate = parseFloat((1 / rates.KRW).toFixed(2)) + 0.5;
            datasetKurs.CNY.rate = Math.round(1 / rates.CNY) + 60;
            datasetKurs.JPY.rate = Math.round(1 / rates.JPY) + 3;
            datasetKurs.THB.rate = Math.round(1 / rates.THB) + 15;

            document.getElementById('status-api').innerText = "LIVE RATES: UPDATED TODAY";
            document.getElementById('indicator-light').style.background = "#00d2ff"; // Cyan glow sukses
            
            prosesKalkulasi();

        } catch (error) {
            console.log('Gagal memuat kurs live, menggunakan data cadangan toko.', error);
            document.getElementById('status-api').innerText = "OFFLINE RATES: USING SHOP BACKUP";
            document.getElementById('indicator-light').style.background = "#ff3b30"; // Merah backup
        }
    }

    // Berpindah mata uang dan memperbarui visual label & info format secara otomatis
    function gantiMataUang(opsi) {
        mataUangAktif = opsi;
        
        document.querySelectorAll('.btn-kurs').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + opsi).classList.add('active');
        
        // Update Label & Simbol Input Harga Barang
        document.getElementById('label-harga').innerText = `Item Price (${datasetKurs[opsi].sym})`;
        document.getElementById('simbol-harga').innerText = datasetKurs[opsi].sym;
        
        // Update Label & Simbol Input Domestic Shipping
        document.getElementById('label-domestik').innerText = `Dom. Shipping (${datasetKurs[opsi].sym})`;
        document.getElementById('simbol-domestik').innerText = datasetKurs[opsi].sym;

        // Atur teks petunjuk format input
        if (opsi === 'KRW') {
            document.getElementById('info-format-harga').innerText = "*Contoh: ketik 0.1 untuk 1,000₩";
            document.getElementById('info-format-domestik').innerText = "*Contoh: ketik 0.3 untuk 3,000₩";
        } else {
            document.getElementById('info-format-harga').innerText = "*Masukkan nominal angka normal";
            document.getElementById('info-format-domestik').innerText = "*Masukkan nominal angka normal";
        }
        
        prosesKalkulasi();
    }

    // Format angka ribuan khas Indonesia
    function formatMataUang(nilai) {
        return Math.round(nilai).toLocaleString('id-ID');
    }

    // Kalkulasi otomatis berjalan di balik layar menggunakan internal rate
    function prosesKalkulasi() {
        let harga = parseFloat(document.getElementById('hargaBarang').value) || 0;
        let domesticVal = parseFloat(document.getElementById('domesticShipping').value) || 0;
        const fee = parseFloat(document.getElementById('feeGo').value) || 0;
        
        // Mengambil rate yang aktif di dalam data internal sistem
        const rateAktif = datasetKurs[mataUangAktif].rate;

        // JIKA KOREA (KRW): Ubah format input desimal kelipatan (0.1) ke bentuk ribuan (1000)
        if (mataUangAktif === 'KRW') {
            harga = harga * 10000;
            domesticVal = domesticVal * 10000;
        }

        const totalKonversiBarang = harga * rateAktif;
        const totalKonversiDomestic = domesticVal * rateAktif;
        const totalAkhir = totalKonversiBarang + fee + totalKonversiDomestic;

        document.getElementById('hasilKonversi').innerText = formatMataUang(totalKonversiBarang);
        document.getElementById('hasilFee').innerText = formatMataUang(fee);
        document.getElementById('hasilDomestic').innerText = formatMataUang(totalKonversiDomestic);
        document.getElementById('hasilTotal').innerText = formatMataUang(totalAkhir);
    }

    // Reset data form input
    function resetSistem() {
        document.getElementById('hargaBarang').value = 0;
        document.getElementById('feeGo').value = 15000;
        document.getElementById('domesticShipping').value = 0;
        gantiMataUang('KRW');
    }

    // Jalankan penarikan kurs otomatis saat halaman pertama kali dimuat
    fetchLiveRates();
</script>
</body>
</html>
